services:
  stalker:
    build:
      context: .
    image: stalk-github-users:latest
    container_name: stalk-github-users
    restart: unless-stopped
    # Copy .env.example to .env and fill in your values before running.
    env_file:
      - .env
    environment:
      # Persist state on the named volume regardless of any STATE_FILE in .env.
      STATE_FILE: /data/state.json
    volumes:
      - stalker-state:/data
    # No ports: this is a polling worker with no HTTP server.

volumes:
  stalker-state:
